services:
  db:
    image: postgres:16-alpine
    container_name: sdlab_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sdlab
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: sdlab_homepage
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdlab -d sdlab_homepage"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      args:
        DATABASE_URL: ${DATABASE_URL}
        AUTH_SECRET: ${AUTH_SECRET}
        AUTH_URL: ${AUTH_URL}
    container_name: sdlab_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sdlab:${DB_PASSWORD}@db:5432/sdlab_homepage
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  postgres_data:
